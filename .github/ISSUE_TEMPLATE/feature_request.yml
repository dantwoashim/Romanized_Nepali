name: Feature request
description: Propose a scoped product or engineering improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow is blocked or slow today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Privacy, data, or scope constraints
      description: Note any data source, licensing, or local-only requirements.
  - type: textarea
    id: validation
    attributes:
      label: How should this be validated?
      description: Fixtures, tests, user feedback, or release gate changes.
